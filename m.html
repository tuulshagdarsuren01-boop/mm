<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:
linear-gradient(
180deg,
#ffdce8,
#fff0f5
);

height:100vh;

display:flex;

justify-content:center;

align-items:center;
}

.page{

width:90%;

max-width:500px;

background:white;

padding:30px;

border-radius:28px;

box-shadow:
0 20px 40px
rgba(0,0,0,.12);

text-align:center;

display:none;

}

.page.active{
display:block;
}

.pin-photo{

width:180px;

height:180px;

margin:auto;

border-radius:50%;

background:#ffe0ea;

display:flex;

justify-content:center;

align-items:center;

font-size:90px;

}

.pin-title{

margin-top:24px;

font-size:28px;

color:#ff4d8d;

}

.dots{

margin:25px 0;

display:flex;

gap:14px;

justify-content:center;

}

.dot{

width:18px;

height:18px;

border-radius:50%;

background:#ddd;

}

.dot.filled{

background:#ff4d8d;

}

.keypad{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:10px;

}

.key{

padding:18px;

border:none;

border-radius:14px;

font-size:22px;

background:#ffd0e0;

cursor:pointer;

}

.key:hover{
transform:scale(1.03);
}

.enter{

margin-top:15px;

width:100%;

padding:16px;

border:none;

background:#ff5b93;

color:white;

font-size:18px;

border-radius:16px;

}

.love-title{

font-size:80px;

}

.love-text{

margin-top:25px;

font-size:22px;

line-height:2;

color:#ff4f8c;

}

</style>
</head>

<body>

<!-- PAGE1 -->

<div
class="page active"
id="page1"
>

<div
class="pin-photo"
>
❤️
</div>

<div class="pin-title">
Код оруул
</div>

<div class="dots">

<div class="dot" id="d0"></div>
<div class="dot" id="d1"></div>
<div class="dot" id="d2"></div>
<div class="dot" id="d3"></div>

</div>

<div class="keypad">

<button class="key" onclick="press(1)">1</button>
<button class="key" onclick="press(2)">2</button>
<button class="key" onclick="press(3)">3</button>

<button class="key" onclick="press(4)">4</button>
<button class="key" onclick="press(5)">5</button>
<button class="key" onclick="press(6)">6</button>

<button class="key" onclick="press(7)">7</button>
<button class="key" onclick="press(8)">8</button>
<button class="key" onclick="press(9)">9</button>

<button class="key" onclick="del()">⌫</button>
<button class="key" onclick="press(0)">0</button>

<button
class="enter"
onclick="check()"
>
Орох
</button>

</div>

</div>

<!-- PAGE3 -->

<div
class="page"
id="page3"
>

<div class="love-title">
💖
</div>

<div class="love-text">

Өнөөдөр гоё өдөр байлаа
<br><br>

Хамт байсан цаг мөчид
баярлалаа ❤️

<br><br>

Хайртай шүү

</div>

</div>

<script>

const CODE="0247";

let pin="";

function press(n){

if(pin.length>=4)
return;

pin+=n;

draw();

if(pin.length===4)
check();

}

function del(){

pin=
pin.slice(0,-1);

draw();

}

function draw(){

for(
let i=0;
i<4;
i++
){

document
.getElementById(
"d"+i
)
.classList.toggle(
"filled",
i<pin.length
);

}

}

function check(){

if(pin===CODE){

document
.getElementById(
"page1"
)
.classList
.remove(
"active"
);

document
.getElementById(
"page3"
)
.classList
.add(
"active"
);

}

else{

alert(
"Код буруу"
);

pin="";

draw();

}

}

</script>

</body>
</html>
